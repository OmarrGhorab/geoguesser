openapi: 3.1.0
info:
  title: GeoGuess API
  version: 0.1.0
  summary: REST API contract for the GeoGuess-style game.
  description: >
    Versioned API contract for authentication, profiles, maps, games, guesses,
    rooms, matchmaking, leaderboards, billing placeholders, and health checks.
    Exact location coordinates are never returned before a guess is locked or a
    round is revealed.
servers:
  - url: http://localhost/api/v1
    description: Local development through Nginx
  - url: http://localhost:8080/api/v1
    description: Local Go API direct
  - url: https://api.example.com/api/v1
    description: Production placeholder
security: []

tags:
  - name: Auth
  - name: Profile
  - name: Maps
  - name: Games
  - name: Rooms
  - name: Matchmaking
  - name: Leaderboards
  - name: Billing
  - name: Webhooks
  - name: Health
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a user
      description: Creates a registered account, creates a profile, and sets auth cookies.
      operationId: registerUser
      security:
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  email: player@example.com
                  password: correct horse battery staple
                  display_name: Raven
      responses:
        '201':
          description: Registered and authenticated.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/SetCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Validates credentials, rotates session state, and sets HTTP-only auth cookies.
      operationId: login
      security:
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  email: player@example.com
                  password: correct horse battery staple
      responses:
        '200':
          description: Authenticated.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/SetCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Revokes the current refresh session and clears auth cookies.
      operationId: logout
      security:
        - accessCookie: []
          csrfHeader: []
      responses:
        '204':
          description: Logged out.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/SetCookie'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh auth session
      description: Rotates the refresh token and issues a new short-lived access token.
      operationId: refreshSession
      security:
        - refreshCookie: []
          csrfHeader: []
      responses:
        '200':
          description: Session refreshed.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/SetCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current session
      description: Returns a registered user session, a guest session, or anonymous state.
      operationId: getCurrentSession
      security:
        - accessCookie: []
        - guestSession: []
        - {}
      responses:
        '200':
          description: Current session summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'

  /profile:
    get:
      tags: [Profile]
      summary: Get current profile
      operationId: getProfile
      security:
        - accessCookie: []
      responses:
        '200':
          description: Current profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Profile]
      summary: Update current profile
      operationId: updateProfile
      security:
        - accessCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{userId}/stats:
    get:
      tags: [Profile]
      summary: Get public user stats
      operationId: getUserStats
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Public user stats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStatsResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /maps:
    get:
      tags: [Maps]
      summary: List playable maps
      operationId: listMaps
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: access_tier
          in: query
          schema:
            $ref: '#/components/schemas/MapAccessTier'
        - name: difficulty
          in: query
          schema:
            $ref: '#/components/schemas/MapDifficulty'
      responses:
        '200':
          description: Public map list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapListResponse'

  /maps/{mapId}:
    get:
      tags: [Maps]
      summary: Get map metadata
      operationId: getMap
      parameters:
        - $ref: '#/components/parameters/MapId'
      responses:
        '200':
          description: Map metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations/{locationId}/media:
    get:
      tags: [Maps]
      summary: Get location media
      description: Returns media URL and attribution only when the requester is allowed to view the location media.
      operationId: getLocationMedia
      security:
        - accessCookie: []
        - guestSession: []
      parameters:
        - $ref: '#/components/parameters/LocationId'
      responses:
        '200':
          description: Location media without hidden coordinates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoundMediaResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /games:
    post:
      tags: [Games]
      summary: Create a game
      description: Creates a solo game or a game shell for supported modes. Supports registered or guest sessions.
      operationId: createGame
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameRequest'
      responses:
        '201':
          description: Game created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}:
    get:
      tags: [Games]
      summary: Get game state
      operationId: getGame
      security:
        - accessCookie: []
        - guestSession: []
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        '200':
          description: Game state visible to the participant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /games/{gameId}/start:
    post:
      tags: [Games]
      summary: Start a game
      operationId: startGame
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/GameId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Game started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /games/{gameId}/rounds/current:
    get:
      tags: [Games]
      summary: Get current round
      description: Returns current round data without true latitude or longitude.
      operationId: getCurrentRound
      security:
        - accessCookie: []
        - guestSession: []
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        '200':
          description: Current round.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentRoundResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /games/{gameId}/rounds/{roundId}/guesses:
    post:
      tags: [Games]
      summary: Submit a guess
      description: Submits one guess for the player in the round and returns score plus revealed location.
      operationId: submitGuess
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/GameId'
        - $ref: '#/components/parameters/RoundId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitGuessRequest'
            examples:
              cairo:
                value:
                  latitude: 30.0444
                  longitude: 31.2357
      responses:
        '200':
          description: Guess accepted or idempotently replayed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuessResultResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /games/{gameId}/results:
    get:
      tags: [Games]
      summary: Get game results
      operationId: getGameResults
      security:
        - accessCookie: []
        - guestSession: []
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        '200':
          description: Game results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResultsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /rooms:
    post:
      tags: [Rooms]
      summary: Create a room
      operationId: createRoom
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Room created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  /rooms/join:
    post:
      tags: [Rooms]
      summary: Join a room by code
      operationId: joinRoom
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRoomRequest'
      responses:
        '200':
          description: Joined room.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'

  /rooms/{roomCode}:
    get:
      tags: [Rooms]
      summary: Get room state
      operationId: getRoom
      security:
        - accessCookie: []
        - guestSession: []
      parameters:
        - $ref: '#/components/parameters/RoomCode'
      responses:
        '200':
          description: Room state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /rooms/{roomCode}/settings:
    patch:
      tags: [Rooms]
      summary: Update room settings
      description: Host-only command. Allowed only before the room game starts.
      operationId: updateRoomSettings
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/RoomCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomSettingsRequest'
      responses:
        '200':
          description: Room updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /rooms/{roomCode}/start:
    post:
      tags: [Rooms]
      summary: Start room game
      operationId: startRoom
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/RoomCode'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Room game started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /rooms/{roomCode}/players/{playerId}:
    delete:
      tags: [Rooms]
      summary: Remove a player from a room
      operationId: removeRoomPlayer
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/RoomCode'
        - $ref: '#/components/parameters/PlayerId'
      responses:
        '204':
          description: Player removed.
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /matchmaking/queue:
    post:
      tags: [Matchmaking]
      summary: Enter matchmaking queue
      operationId: enterMatchmakingQueue
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnterMatchmakingRequest'
      responses:
        '202':
          description: Added to queue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchmakingStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Matchmaking]
      summary: Leave matchmaking queue
      operationId: leaveMatchmakingQueue
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      responses:
        '204':
          description: Removed from queue.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /matchmaking/status:
    get:
      tags: [Matchmaking]
      summary: Get matchmaking status
      operationId: getMatchmakingStatus
      security:
        - accessCookie: []
        - guestSession: []
      responses:
        '200':
          description: Current queue or match status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchmakingStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /leaderboards/global:
    get:
      tags: [Leaderboards]
      summary: Get global leaderboard
      operationId: getGlobalLeaderboard
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Global leaderboard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardResponse'

  /leaderboards/daily:
    get:
      tags: [Leaderboards]
      summary: Get daily leaderboard
      operationId: getDailyLeaderboard
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: date
          in: query
          description: Daily challenge date in YYYY-MM-DD format. Defaults to current UTC date.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Daily leaderboard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardResponse'

  /leaderboards/maps/{mapId}:
    get:
      tags: [Leaderboards]
      summary: Get map leaderboard
      operationId: getMapLeaderboard
      parameters:
        - $ref: '#/components/parameters/MapId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Map leaderboard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /billing/entitlements:
    get:
      tags: [Billing]
      summary: Get current user entitlements
      operationId: getEntitlements
      security:
        - accessCookie: []
      responses:
        '200':
          description: Current entitlements.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntitlementsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /billing/checkout:
    post:
      tags: [Billing]
      summary: Create checkout session
      description: Future monetization endpoint. Subscriptions must not affect scoring fairness.
      operationId: createCheckoutSession
      security:
        - accessCookie: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckoutRequest'
      responses:
        '201':
          description: Checkout session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /billing/portal:
    post:
      tags: [Billing]
      summary: Create billing portal session
      operationId: createBillingPortalSession
      security:
        - accessCookie: []
          csrfHeader: []
      responses:
        '201':
          description: Billing portal session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingPortalResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /webhooks/payments:
    post:
      tags: [Webhooks]
      summary: Receive payment webhook
      description: Verifies provider signature and processes payment/subscription events idempotently.
      operationId: receivePaymentWebhook
      security:
        - paymentWebhookSignature: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '204':
          description: Webhook accepted.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ready:
    get:
      tags: [Health]
      summary: Readiness check
      operationId: getReadiness
      responses:
        '200':
          description: Dependencies are ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: One or more dependencies are not ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'

  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics
      description: Internal-only Prometheus scrape endpoint. Do not expose publicly.
      operationId: getMetrics
      responses:
        '200':
          description: Prometheus text exposition format.
          content:
            text/plain:
              schema:
                type: string

components:
  securitySchemes:
    accessCookie:
      type: apiKey
      in: cookie
      name: access_token
      description: Short-lived JWT access token in an HTTP-only secure cookie.
    refreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: Rotated refresh token in an HTTP-only secure cookie.
    guestSession:
      type: apiKey
      in: cookie
      name: guest_session
      description: Signed guest session cookie for anonymous gameplay.
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Required for unsafe cookie-authenticated requests.
    paymentWebhookSignature:
      type: apiKey
      in: header
      name: X-Payment-Signature
      description: Provider-specific payment webhook signature.

  headers:
    SetCookie:
      description: HTTP-only auth or guest session cookie.
      schema:
        type: string

  parameters:
    GameId:
      name: gameId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RoundId:
      name: roundId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MapId:
      name: mapId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LocationId:
      name: locationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RoomCode:
      name: roomCode
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Z0-9]{6,10}$'
    PlayerId:
      name: playerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
        minLength: 1
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 16
        maxLength: 128

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but not allowed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict or duplicate command.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Request is syntactically valid but violates domain state rules.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Too many requests.
      headers:
        Retry-After:
          description: Seconds until retry is allowed.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          examples: [validation_failed]
        message:
          type: string
          examples: [The request body is invalid.]
        request_id:
          type: string
          examples: [req_01J0H5ZK9Y6B4D7T2M9F3X1A8C]
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    FieldError:
      type: object
      required: [name, code, message]
      properties:
        name:
          type: string
          examples: [email]
        code:
          type: string
          examples: [invalid_email]
        message:
          type: string
          examples: [Email must be valid.]

    PageInfo:
      type: object
      required: [limit]
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 100
        next_cursor:
          type: [string, 'null']

    RegisterRequest:
      type: object
      required: [email, password, display_name]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 12
          maxLength: 256
        display_name:
          type: string
          minLength: 2
          maxLength: 32
    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 1
          maxLength: 256
    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'
    SessionResponse:
      type: object
      required: [kind, authenticated]
      properties:
        kind:
          type: string
          enum: [anonymous, guest, user]
        authenticated:
          type: boolean
        user:
          anyOf:
            - $ref: '#/components/schemas/User'
            - type: 'null'
        guest:
          anyOf:
            - $ref: '#/components/schemas/GuestSession'
            - type: 'null'
    User:
      type: object
      required: [id, email, display_name, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum: [user, moderator, admin]
    GuestSession:
      type: object
      required: [id, display_name]
      properties:
        id:
          type: string
        display_name:
          type: string

    ProfileResponse:
      type: object
      required: [profile, stats]
      properties:
        profile:
          $ref: '#/components/schemas/Profile'
        stats:
          $ref: '#/components/schemas/UserStats'
    Profile:
      type: object
      required: [user_id, email, display_name, locale]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        avatar_url:
          type: [string, 'null']
          format: uri
        country_code:
          type: [string, 'null']
          minLength: 2
          maxLength: 2
        locale:
          type: string
        timezone:
          type: [string, 'null']
    UpdateProfileRequest:
      type: object
      additionalProperties: false
      properties:
        display_name:
          type: string
          minLength: 2
          maxLength: 32
        avatar_url:
          type: [string, 'null']
          format: uri
        country_code:
          type: [string, 'null']
          minLength: 2
          maxLength: 2
        locale:
          type: string
          minLength: 2
          maxLength: 16
        timezone:
          type: [string, 'null']
          maxLength: 64
    UserStatsResponse:
      type: object
      required: [stats]
      properties:
        stats:
          $ref: '#/components/schemas/UserStats'
    UserStats:
      type: object
      required: [games_played, total_score, average_score, best_score]
      properties:
        games_played:
          type: integer
          minimum: 0
        total_score:
          type: integer
          minimum: 0
        average_score:
          type: number
          minimum: 0
        best_score:
          type: integer
          minimum: 0

    MapListResponse:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Map'
        page:
          $ref: '#/components/schemas/PageInfo'
    MapResponse:
      type: object
      required: [map]
      properties:
        map:
          $ref: '#/components/schemas/Map'
    Map:
      type: object
      required: [id, slug, name, visibility, access_tier, difficulty, status]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
        visibility:
          type: string
          enum: [public, private, unlisted]
        access_tier:
          $ref: '#/components/schemas/MapAccessTier'
        difficulty:
          $ref: '#/components/schemas/MapDifficulty'
        status:
          type: string
          enum: [draft, active, archived]
    MapAccessTier:
      type: string
      enum: [free, premium, admin]
    MapDifficulty:
      type: string
      enum: [mixed, easy, medium, hard]

    RoundMediaResponse:
      type: object
      required: [media]
      properties:
        media:
          $ref: '#/components/schemas/RoundMedia'
    RoundMedia:
      type: object
      required: [type, url]
      properties:
        type:
          type: string
          enum: [image, panorama]
        url:
          type: string
          format: uri
        attribution:
          type: [string, 'null']

    CreateGameRequest:
      type: object
      required: [mode, map_id, round_count]
      additionalProperties: false
      properties:
        mode:
          $ref: '#/components/schemas/GameMode'
        map_id:
          type: string
          format: uuid
        round_count:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
        timer_seconds:
          type: [integer, 'null']
          minimum: 10
          maximum: 600
    GameResponse:
      type: object
      required: [game]
      properties:
        game:
          $ref: '#/components/schemas/Game'
    Game:
      type: object
      required:
        - id
        - mode
        - status
        - round_count
        - scoring_version
        - current_round_number
        - total_score
      properties:
        id:
          type: string
          format: uuid
        mode:
          $ref: '#/components/schemas/GameMode'
        status:
          $ref: '#/components/schemas/GameStatus'
        map_id:
          type: string
          format: uuid
        round_count:
          type: integer
        timer_seconds:
          type: [integer, 'null']
        scoring_version:
          type: integer
        current_round_number:
          type: [integer, 'null']
        total_score:
          type: integer
          minimum: 0
        started_at:
          type: [string, 'null']
          format: date-time
        completed_at:
          type: [string, 'null']
          format: date-time
    GameMode:
      type: string
      enum: [solo, private_room, quick_play, daily, ranked]
    GameStatus:
      type: string
      enum: [pending, active, completed, abandoned, cancelled]
    CurrentRoundResponse:
      type: object
      required: [round]
      properties:
        round:
          $ref: '#/components/schemas/Round'
    Round:
      type: object
      required: [id, round_number, status, media]
      properties:
        id:
          type: string
          format: uuid
        round_number:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [pending, active, completed, cancelled]
        starts_at:
          type: [string, 'null']
          format: date-time
        ends_at:
          type: [string, 'null']
          format: date-time
        media:
          $ref: '#/components/schemas/RoundMedia'
    SubmitGuessRequest:
      type: object
      required: [latitude, longitude]
      additionalProperties: false
      properties:
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
    GuessResultResponse:
      type: object
      required: [guess, actual_location]
      properties:
        guess:
          $ref: '#/components/schemas/GuessResult'
        actual_location:
          $ref: '#/components/schemas/RevealedLocation'
    GuessResult:
      type: object
      required: [id, latitude, longitude, distance_meters, score, submitted_at]
      properties:
        id:
          type: string
          format: uuid
        latitude:
          type: number
        longitude:
          type: number
        distance_meters:
          type: integer
          minimum: 0
        score:
          type: integer
          minimum: 0
          maximum: 5000
        submitted_at:
          type: string
          format: date-time
    RevealedLocation:
      type: object
      required: [latitude, longitude, country_code]
      properties:
        latitude:
          type: number
        longitude:
          type: number
        country_code:
          type: string
          minLength: 2
          maxLength: 2
        region:
          type: [string, 'null']
        locality:
          type: [string, 'null']
    GameResultsResponse:
      type: object
      required: [game, players, rounds]
      properties:
        game:
          $ref: '#/components/schemas/Game'
        players:
          type: array
          items:
            $ref: '#/components/schemas/GamePlayer'
        rounds:
          type: array
          items:
            $ref: '#/components/schemas/RoundResult'
    GamePlayer:
      type: object
      required: [id, display_name, role, status, total_score]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: [string, 'null']
          format: uuid
        display_name:
          type: string
        role:
          type: string
          enum: [host, player, spectator]
        status:
          type: string
          enum: [active, disconnected, left, kicked]
        total_score:
          type: integer
          minimum: 0
    RoundResult:
      type: object
      required: [round_id, round_number, actual_location, guesses]
      properties:
        round_id:
          type: string
          format: uuid
        round_number:
          type: integer
        actual_location:
          $ref: '#/components/schemas/RevealedLocation'
        guesses:
          type: array
          items:
            $ref: '#/components/schemas/GuessResult'

    CreateRoomRequest:
      type: object
      required: [map_id, visibility, round_count, max_players]
      additionalProperties: false
      properties:
        map_id:
          type: string
          format: uuid
        visibility:
          type: string
          enum: [private, public]
        round_count:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
        timer_seconds:
          type: [integer, 'null']
          minimum: 10
          maximum: 600
        max_players:
          type: integer
          minimum: 2
          maximum: 50
          default: 8
    JoinRoomRequest:
      type: object
      required: [code]
      additionalProperties: false
      properties:
        code:
          type: string
          pattern: '^[A-Z0-9]{6,10}$'
        display_name:
          type: string
          minLength: 2
          maxLength: 32
    UpdateRoomSettingsRequest:
      type: object
      additionalProperties: false
      properties:
        round_count:
          type: integer
          minimum: 1
          maximum: 10
        timer_seconds:
          type: [integer, 'null']
          minimum: 10
          maximum: 600
        max_players:
          type: integer
          minimum: 2
          maximum: 50
    RoomResponse:
      type: object
      required: [room]
      properties:
        room:
          $ref: '#/components/schemas/Room'
    Room:
      type: object
      required:
        - id
        - code
        - visibility
        - status
        - max_players
        - round_count
        - players
      properties:
        id:
          type: string
          format: uuid
        game_id:
          type: [string, 'null']
          format: uuid
        code:
          type: string
        visibility:
          type: string
          enum: [private, public]
        status:
          type: string
          enum: [lobby, active, completed, expired, cancelled]
        max_players:
          type: integer
        round_count:
          type: integer
        timer_seconds:
          type: [integer, 'null']
        expires_at:
          type: string
          format: date-time
        players:
          type: array
          items:
            $ref: '#/components/schemas/GamePlayer'

    EnterMatchmakingRequest:
      type: object
      required: [mode]
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [quick_play]
        region:
          type: [string, 'null']
          maxLength: 32
        map_id:
          type: [string, 'null']
          format: uuid
    MatchmakingStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [idle, queued, matched, expired]
        queue:
          anyOf:
            - $ref: '#/components/schemas/MatchmakingQueue'
            - type: 'null'
        room:
          anyOf:
            - $ref: '#/components/schemas/Room'
            - type: 'null'
    MatchmakingQueue:
      type: object
      required: [mode, enqueued_at]
      properties:
        mode:
          type: string
          enum: [quick_play]
        region:
          type: [string, 'null']
        enqueued_at:
          type: string
          format: date-time
        estimated_wait_seconds:
          type: [integer, 'null']
          minimum: 0

    LeaderboardResponse:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardEntry'
        page:
          $ref: '#/components/schemas/PageInfo'
    LeaderboardEntry:
      type: object
      required: [rank, user_id, display_name, score, games_played]
      properties:
        rank:
          type: integer
          minimum: 1
        user_id:
          type: string
          format: uuid
        display_name:
          type: string
        score:
          type: integer
          minimum: 0
        games_played:
          type: integer
          minimum: 0

    EntitlementsResponse:
      type: object
      required: [entitlements]
      properties:
        entitlements:
          type: array
          items:
            $ref: '#/components/schemas/Entitlement'
    Entitlement:
      type: object
      required: [key, active]
      properties:
        key:
          type: string
          examples: [ad_free]
        active:
          type: boolean
        expires_at:
          type: [string, 'null']
          format: date-time
    CreateCheckoutRequest:
      type: object
      required: [plan_code]
      additionalProperties: false
      properties:
        plan_code:
          type: string
          examples: [pro_monthly]
        success_url:
          type: string
          format: uri
        cancel_url:
          type: string
          format: uri
    CheckoutResponse:
      type: object
      required: [checkout_url]
      properties:
        checkout_url:
          type: string
          format: uri
    BillingPortalResponse:
      type: object
      required: [portal_url]
      properties:
        portal_url:
          type: string
          format: uri

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: [string, 'null']
    ReadinessResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: object
          additionalProperties:
            type: string
            enum: [ok, error]
