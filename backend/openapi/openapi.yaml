      properties:
        id:
          type: string
          format: uuid
        round_number:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [pending, active, completed, cancelled]
        starts_at:
          type: [string, 'null']
          format: date-time
        ends_at:
          type: [string, 'null']
          format: date-time
        media:
          anyOf:
            - $ref: '#/components/schemas/RoundMedia'
            - type: 'null'
        revealed:
          type: boolean
