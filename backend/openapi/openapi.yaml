openapi: 3.1.0
info:
  title: GeoGuess API
  version: 0.1.0
  summary: REST API contract for the GeoGuess-style game.
  description: >
    Versioned API contract for authentication, profiles, maps, games, guesses,
    rooms, matchmaking, leaderboards, billing placeholders, and health checks.
    Exact location coordinates are never returned before a guess is locked or a
    round is revealed.
servers:
  - url: http://localhost/api/v1
    description: Local development through Nginx
  - url: http://localhost:8080/api/v1
    description: Local Go API direct
  - url: https://api.example.com/api/v1
    description: Production placeholder
security: []

tags:
  - name: Auth
  - name: Profile
  - name: Uploads
  - name: Maps
  - name: Games
  - name: Rooms
  - name: Matchmaking
  - name: Leaderboards
  - name: Challenges
  - name: Missions
  - name: Streaks
  - name: Billing
  - name: Webhooks
  - name: Health
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a user
      description: Creates a registered account, creates a profile, and sets auth cookies.
      operationId: registerUser
      security:
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  email: player@example.com
                  password: correct horse battery staple
                  display_name: Raven
      responses:
        '201':
          description: Registered and authenticated.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/SetCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Validates credentials, rotates session state, and sets HTTP-only auth cookies.
      operationId: login
      security:
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  email: player@example.com
                  password: correct horse battery staple
      responses:
        '200':
          description: Authenticated.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/SetCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Revokes the current refresh session and clears auth cookies.
      operationId: logout
      security:
        - accessCookie: []
          csrfHeader: []
      responses:
        '204':
          description: Logged out.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/SetCookie'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh auth session
      description: Rotates the refresh token and issues a new short-lived access token.
      operationId: refreshSession
      security:
        - refreshCookie: []
          csrfHeader: []
      responses:
        '200':
          description: Session refreshed.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/SetCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current session
      description: Returns a registered user session, a guest session, or anonymous state.
      operationId: getCurrentSession
      security:
        - accessCookie: []
        - guestSession: []
        - {}
      responses:
        '200':
          description: Current session summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'

  /auth/oauth/{provider}:
    get:
      tags: [Auth]
      summary: Initiate OAuth sign-in
      description: Redirects the browser to the selected OAuth provider authorization endpoint.
      operationId: initiateOAuth
      parameters:
        - $ref: '#/components/parameters/OAuthProvider'
      responses:
        '302':
          description: Redirect to OAuth provider.
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/oauth/{provider}/callback:
    get:
      tags: [Auth]
      summary: OAuth callback
      description: Completes the OAuth flow, creates or links the account, and sets auth cookies.
      operationId: oauthCallback
      parameters:
        - $ref: '#/components/parameters/OAuthProvider'
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Authenticated via OAuth.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/SetCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset OTP
      description: Sends a one-time password to the registered email address. Returns success even if the email is not registered to prevent enumeration.
      operationId: requestPasswordReset
      security:
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '204':
          description: OTP request accepted.
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with OTP
      description: Validates the OTP and updates the user's password. Invalidates all existing sessions.
      operationId: resetPassword
      security:
        - csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: Password updated.
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'

  /uploads:
    post:
      tags: [Uploads]
      summary: Create upload
      description: Creates a pending upload and returns a presigned URL for direct upload to R2.
      operationId: createUpload
      security:
        - accessCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUploadRequest'
      responses:
        '201':
          description: Upload created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  /uploads/complete:
    post:
      tags: [Uploads]
      summary: Complete upload
      description: Verifies the object exists in storage and records the file.
      operationId: completeUpload
      security:
        - accessCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteUploadRequest'
      responses:
        '200':
          description: Upload completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /files/{fileId}/signed-url:
    get:
      tags: [Uploads]
      summary: Get signed download URL
      description: Returns a time-limited signed URL to download a private file.
      operationId: getSignedURL
      security:
        - accessCookie: []
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: Signed URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignedURLResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /profile:
    get:
      tags: [Profile]
      summary: Get current profile
      operationId: getProfile
      security:
        - accessCookie: []
      responses:
        '200':
          description: Current profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Profile]
      summary: Update current profile
      operationId: updateProfile
      security:
        - accessCookie: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{userId}/stats:
    get:
      tags: [Profile]
      summary: Get public user stats
      operationId: getUserStats
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Public user stats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStatsResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{userId}/games:
    get:
      tags: [Profile]
      summary: Get user game history
      operationId: getUserGameHistory
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Cursor-paginated list of the user's games.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGameHistoryResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /maps:
    get:
      tags: [Maps]
      summary: List playable maps
      operationId: listMaps
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: access_tier
          in: query
          schema:
            $ref: '#/components/schemas/MapAccessTier'
        - name: difficulty
          in: query
          schema:
            $ref: '#/components/schemas/MapDifficulty'
      responses:
        '200':
          description: Public map list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /maps/{mapId}:
    get:
      tags: [Maps]
      summary: Get map metadata
      operationId: getMap
      parameters:
        - $ref: '#/components/parameters/MapId'
      responses:
        '200':
          description: Map metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /locations/{locationId}/media:
    get:
      tags: [Maps]
      summary: Get location media
      description: Returns media URL and attribution only when the requester is allowed to view the location media.
      operationId: getLocationMedia
      security:
        - accessCookie: []
        - guestSession: []
        - {}
      parameters:
        - $ref: '#/components/parameters/LocationId'
      responses:
        '200':
          description: Location media without hidden coordinates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoundMediaResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /games:
    post:
      tags: [Games]
      summary: Create a game
      description: Creates a Phase 04 solo game for a registered or guest session. The backend selects all round locations, stores durable game state, and rejects maps without enough unique active locations.
      operationId: createGame
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameRequest'
      responses:
        '201':
          description: Game created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /games/{gameId}:
    get:
      tags: [Games]
      summary: Get game state
      operationId: getGame
      security:
        - accessCookie: []
        - guestSession: []
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        '200':
          description: Game state visible to the participant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /games/{gameId}/start:
    post:
      tags: [Games]
      summary: Start a game
      description: Starts a pending solo game, sets server-owned timestamps, and activates the first round.
      operationId: startGame
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/GameId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Game started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /games/{gameId}/rounds/current:
    get:
      tags: [Games]
      summary: Get current round
      description: Returns current round data without true latitude, true longitude, location id, provider refs, or any hidden answer metadata.
      operationId: getCurrentRound
      security:
        - accessCookie: []
        - guestSession: []
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        '200':
          description: Current round.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentRoundResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /games/{gameId}/rounds/{roundId}/guesses:
    post:
      tags: [Games]
      summary: Submit a guess
      description: Submits one server-scored guess for the current round and returns score plus revealed location. Repeating the same Idempotency-Key with the same coordinates returns the original result; reusing it with different coordinates returns conflict.
      operationId: submitGuess
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/GameId'
        - $ref: '#/components/parameters/RoundId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitGuessRequest'
            examples:
              cairo:
                value:
                  latitude: 30.0444
                  longitude: 31.2357
      responses:
        '200':
          description: Guess accepted or idempotently replayed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuessResultResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /games/{gameId}/results:
    get:
      tags: [Games]
      summary: Get game results
      description: Returns durable final results for the owning player after a solo game is completed.
      operationId: getGameResults
      security:
        - accessCookie: []
        - guestSession: []
      parameters:
        - $ref: '#/components/parameters/GameId'
      responses:
        '200':
          description: Game results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResultsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /rooms:
    post:
      tags: [Rooms]
      summary: Create a room
      operationId: createRoom
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: Room created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  /rooms/join:
    post:
      tags: [Rooms]
      summary: Join a room by code
      operationId: joinRoom
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinRoomRequest'
      responses:
        '200':
          description: Joined room.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'

  /rooms/{roomCode}:
    get:
      tags: [Rooms]
      summary: Get room state
      operationId: getRoom
      security:
        - accessCookie: []
        - guestSession: []
      parameters:
        - $ref: '#/components/parameters/RoomCode'
      responses:
        '200':
          description: Room state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /rooms/{roomCode}/settings:
    patch:
      tags: [Rooms]
      summary: Update room settings
      description: Host-only command. Allowed only before the room game starts.
      operationId: updateRoomSettings
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/RoomCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomSettingsRequest'
      responses:
        '200':
          description: Room updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /rooms/{roomCode}/start:
    post:
      tags: [Rooms]
      summary: Start room game
      operationId: startRoom
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/RoomCode'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Room game started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /rooms/{roomCode}/ready:
    post:
      tags: [Rooms]
      summary: Update player readiness
      operationId: setRoomReady
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/RoomCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReadyRoomRequest'
      responses:
        '200':
          description: Ready state updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /rooms/{roomCode}/players/{playerId}:
    delete:
      tags: [Rooms]
      summary: Remove a player from a room
      operationId: removeRoomPlayer
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      parameters:
        - $ref: '#/components/parameters/RoomCode'
        - $ref: '#/components/parameters/PlayerId'
      responses:
        '200':
          description: Player removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /matchmaking/queue:
    post:
      tags: [Matchmaking]
      summary: Enter matchmaking queue
      operationId: enterMatchmakingQueue
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnterMatchmakingRequest'
      responses:
        '202':
          description: Added to queue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchmakingStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Matchmaking]
      summary: Leave matchmaking queue
      operationId: leaveMatchmakingQueue
      security:
        - accessCookie: []
          csrfHeader: []
        - guestSession: []
          csrfHeader: []
      responses:
        '204':
          description: Removed from queue.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /matchmaking/status:
    get:
      tags: [Matchmaking]
      summary: Get matchmaking status
      operationId: getMatchmakingStatus
      security:
        - accessCookie: []
        - guestSession: []
      responses:
        '200':
