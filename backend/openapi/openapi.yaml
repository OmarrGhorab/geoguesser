components:
  securitySchemes:
    accessCookie:
      type: apiKey
      in: cookie
      name: access_token
      description: Short-lived JWT access token in an HTTP-only secure cookie.
    refreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: Rotated refresh token in an HTTP-only secure cookie.
    guestSession:
      type: apiKey
      in: cookie
      name: guest_session
      description: Signed guest session cookie for anonymous gameplay.
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Required for unsafe cookie-authenticated requests.
    paymentWebhookSignature:
      type: apiKey
      in: header
      name: X-Payment-Signature
      description: Provider-specific payment webhook signature.

  headers:
    SetCookie:
      description: HTTP-only auth or guest session cookie.
      schema:
        type: string

  parameters:

    ChallengeId:
      name: challengeId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    GameId:
      name: gameId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RoundId:
      name: roundId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MapId:
      name: mapId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LocationId:
      name: locationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FileId:
      name: fileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OAuthProvider:
      name: provider
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/OAuthProvider'
    RoomCode:
      name: roomCode
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Z0-9]{6,10}$'
    PlayerId:
      name: playerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
        minLength: 1
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Stable retry key for replay-safe writes. Identical requests replay the original successful result; conflicting reuse returns 409.
      schema:
        type: string
        minLength: 16
        maxLength: 128

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but not allowed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict or duplicate command.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Request is syntactically valid but violates domain state rules.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Too many requests.
      headers:
        Retry-After:
          description: Seconds until retry is allowed.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          examples: [validation_failed]
        message:
          type: string
          examples: [The request body is invalid.]
        request_id:
          type: string
          examples: [req_01J0H5ZK9Y6B4D7T2M9F3X1A8C]
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    FieldError:
      type: object
      required: [name, code, message]
      properties:
        name:
          type: string
          examples: [email]
        code:
          type: string
          examples: [invalid_email]
        message:
          type: string
          examples: [Email must be valid.]

    PageInfo:
      type: object
      required: [limit]
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 100
        next_cursor:
          type: [string, 'null']

    RegisterRequest:
      type: object
      required: [email, password, display_name]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 12
          maxLength: 256
        display_name:
          type: string
          minLength: 2
          maxLength: 32
    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 1
          maxLength: 256
    OAuthProvider:
      type: string
      enum: [google, discord]
    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/User'
    SessionResponse:
      type: object
      required: [kind, authenticated]
      properties:
        kind:
          type: string
          enum: [anonymous, guest, user]
        authenticated:
          type: boolean
        user:
          anyOf:
            - $ref: '#/components/schemas/User'
            - type: 'null'
        guest:
          anyOf:
            - $ref: '#/components/schemas/GuestSession'
            - type: 'null'
    User:
      type: object
      required: [id, email, display_name, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum: [user, moderator, admin]
    GuestSession:
      type: object
      required: [id, display_name]
      properties:
        id:
          type: string
        display_name:
          type: string

    ProfileResponse:
      type: object
      required: [profile, stats]
      properties:
        profile:
          $ref: '#/components/schemas/Profile'
        stats:
          $ref: '#/components/schemas/UserStats'
    Profile:
      type: object
      required: [user_id, email, display_name, locale]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        avatar_url:
          type: [string, 'null']
          format: uri
        country_code:
          type: [string, 'null']
          minLength: 2
          maxLength: 2
        locale:
          type: string
        timezone:
          type: [string, 'null']
    UpdateProfileRequest:
      type: object
      additionalProperties: false
      properties:
        display_name:
          type: string
          minLength: 2
          maxLength: 32
        avatar_url:
          type: [string, 'null']
          format: uri
        country_code:
          type: [string, 'null']
          minLength: 2
          maxLength: 2
        locale:
          type: string
          minLength: 2
          maxLength: 16
        timezone:
          type: [string, 'null']
          maxLength: 64
    UserStatsResponse:
      type: object
      required: [stats]
      properties:
        stats:
          $ref: '#/components/schemas/UserStats'
    UserStats:
      type: object
      required: [games_played, total_score, average_score, best_score]
      properties:
        games_played:
          type: integer
          minimum: 0
        total_score:
          type: integer
          minimum: 0
        average_score:
          type: number
          minimum: 0
        best_score:
          type: integer
          minimum: 0

    UserGameHistoryResponse:
      type: object
      required: [games, page]
      properties:
        games:
          type: array
          items:
            $ref: '#/components/schemas/UserGameHistoryItem'
        page:
          $ref: '#/components/schemas/PageInfo'
    UserGameHistoryItem:
      type: object
      required: [id, map_id, mode, status, round_count, total_score, created_at]
      properties:
        id:
          type: string
          format: uuid
        map_id:
          type: string
          format: uuid
        mode:
          type: string
        status:
          type: string
        round_count:
          type: integer
          minimum: 1
        total_score:
          type: integer
          minimum: 0
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    MapListResponse:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Map'
        page:
          $ref: '#/components/schemas/PageInfo'
    MapResponse:
      type: object
      required: [map]
      properties:
        map:
          $ref: '#/components/schemas/Map'
    Map:
      type: object
      required: [id, slug, name, visibility, access_tier, difficulty, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
        visibility:
          type: string
          enum: [public, private, unlisted]
        access_tier:
          $ref: '#/components/schemas/MapAccessTier'
        difficulty:
          $ref: '#/components/schemas/MapDifficulty'
        status:
          type: string
          enum: [draft, active, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    MapAccessTier:
      type: string
      enum: [free, premium, admin]
    ForgotPasswordRequest:
      type: object
      required: [email]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 254
    ResetPasswordRequest:
      type: object
      required: [email, otp, new_password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        otp:
          type: string
          minLength: 6
          maxLength: 6
        new_password:
          type: string
          minLength: 12
          maxLength: 256
    CreateUploadRequest:
      type: object
      required: [file_name, content_type, size_bytes]
      additionalProperties: false
      properties:
        file_name:
          type: string
          maxLength: 255
        content_type:
          type: string
          enum: [image/jpeg, image/png, image/gif, image/webp, image/svg+xml]
        size_bytes:
          type: integer
          minimum: 1
          maximum: 10485760
    CreateUploadResponse:
      type: object
      required: [upload_id, upload_url, expires_at, storage_key]
      properties:
        upload_id:
          type: string
          format: uuid
        upload_url:
          type: string
          format: uri
        expires_at:
          type: string
          format: date-time
        storage_key:
          type: string
    CompleteUploadRequest:
      type: object
      required: [upload_id]
      additionalProperties: false
      properties:
        upload_id:
          type: string
          format: uuid
    FileResponse:
      type: object
      required: [file]
      properties:
        file:
          $ref: '#/components/schemas/File'
    File:
      type: object
      required: [id, file_name, content_type, size_bytes, created_at]
      properties:
        id:
          type: string
          format: uuid
        file_name:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
        created_at:
          type: string
          format: date-time
    SignedURLResponse:
      type: object
      required: [url, expires_at]
      properties:
        url:
          type: string
          format: uri
        expires_at:
          type: string
          format: date-time
    MapDifficulty:
      type: string
      enum: [mixed, easy, medium, hard]

    RoundMediaResponse:
      type: object
      required: [media]
      properties:
        media:
          $ref: '#/components/schemas/RoundMedia'
    RoundMedia:
      type: object
      required: [type, url]
      properties:
        type:
          type: string
          enum: [image, panorama]
        url:
          type: string
          format: uri
        attribution:
          type: [string, 'null']

    CreateGameRequest:
      type: object
      required: [mode, map_id, round_count]
      additionalProperties: false
      description: Phase 04 accepts solo games only, even though the shared GameMode enum includes future modes.
      properties:
        mode:
          $ref: '#/components/schemas/GameMode'
