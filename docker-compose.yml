services:
  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      # Force the container to bind on all interfaces so the port is reachable.
      HTTP_ADDR: "0.0.0.0:8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "/app/api", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install -g pnpm@10.24.0 && pnpm install --store-dir /root/.pnpm-store && pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      BACKEND_API_URL: http://api:8080/api/v1
      PNPM_STORE_DIR: /root/.pnpm-store
      CI: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - pnpm_store:/root/.pnpm-store
    depends_on:
      - api

volumes:
  client_node_modules:
  pnpm_store:
