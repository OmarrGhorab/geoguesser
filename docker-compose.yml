services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: geoguess
      POSTGRES_USER: geoguess
      POSTGRES_PASSWORD: geoguess
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoguess -d geoguess"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      HTTP_ADDR: ":8080"
      ALLOWED_ORIGIN: http://localhost:3000
      DATABASE_URL: postgres://geoguess:geoguess@postgres:5432/geoguess?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/api", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install -g pnpm@10.24.0 && pnpm install && pnpm dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      BACKEND_API_URL: http://api:8080/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  client_node_modules:
